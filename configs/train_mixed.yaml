# Config B: Mixed curriculum (LoCoMo + LongMemEval)
# Default: Qwen-2.5-7B + LoRA, runs on L40S 48GB or any GPU ≥48GB
experiment:
  name: "config_b_mixed"
  seed: 42

model:
  name: "Qwen/Qwen2.5-7B-Instruct"

data:
  train_file: "data/processed/mixed_train.jsonl"
  val_file: "data/processed/mixed_val.jsonl"

training:
  algorithm: "grpo"
  use_lora: true
  lora_rank: 16
  lora_alpha: 32
  gradient_checkpointing: true
  batch_size: 1
  group_size: 4
  learning_rate: 5.0e-6
  gradient_accumulation_steps: 4
  train_answer_agent: true
  train_memory_manager: true
  aa_epochs: 2
  mm_epochs: 2
  aa_max_completion_length: 1024
  mm_max_completion_length: 256

reward:
  type: "f1"

retrieval:
  top_k: 60

wandb:
  project: "rl-memory-curriculum"
  entity: null
  enabled: true
