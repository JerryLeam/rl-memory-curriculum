# Config A (Full FT): LoCoMo-only training (Memory-R1 baseline curriculum)
# Requires H100 80GB or A100 80GB
experiment:
  name: "config_a_locomo_only"
  seed: 42

model:
  name: "Qwen/Qwen2.5-7B-Instruct"

data:
  train_file: "data/processed/locomo_train.jsonl"
  val_file: "data/processed/locomo_val.jsonl"

training:
  algorithm: "grpo"
  use_lora: false
  gradient_checkpointing: true
  batch_size: 2
  group_size: 4
  learning_rate: 1.0e-6
  gradient_accumulation_steps: 2
  train_answer_agent: true
  train_memory_manager: true
  aa_epochs: 2
  mm_epochs: 2
  aa_max_completion_length: 1024
  mm_max_completion_length: 256

reward:
  type: "em"

retrieval:
  top_k: 60
