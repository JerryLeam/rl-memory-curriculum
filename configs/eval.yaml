# Evaluation: 7 models × 2 benchmarks
# Works with both LoRA and Full FT checkpoints (auto-detected from training_meta.json)
# Note: Qwen3.5 requires vLLM >= 0.17. Use --backend hf if vLLM 0.17 is not available.
evaluation:
  benchmarks:
    - name: "locomo"
      test_file: "data/processed/locomo_test.jsonl"
      num_samples: 1307
    - name: "longmemeval"
      test_file: "data/processed/longmemeval_test.jsonl"
      num_samples: 415

  models:
    # 1. Baseline: no RL
    - name: "baseline_no_rl"
      checkpoint: "unsloth/Qwen3.5-4B"
      is_baseline: true

    # 2-4. AA-only (no MM training)
    - name: "config_a_aa_only"
      checkpoint: "checkpoints/config_a_locomo_only/answer_agent/"
      base_model: "unsloth/Qwen3.5-4B"
    - name: "config_b_aa_only"
      checkpoint: "checkpoints/config_b_mixed/answer_agent/"
      base_model: "unsloth/Qwen3.5-4B"
    - name: "config_c_aa_only"
      checkpoint: "checkpoints/config_c_longmemeval_only/answer_agent/"
      base_model: "unsloth/Qwen3.5-4B"

    # 5-7. AA+MM (full pipeline)
    - name: "config_a_full"
      checkpoint: "checkpoints/config_a_locomo_only/answer_agent/"
      mm_checkpoint: "checkpoints/config_a_locomo_only/memory_manager/"
      base_model: "unsloth/Qwen3.5-4B"
      use_mm: true
    - name: "config_b_full"
      checkpoint: "checkpoints/config_b_mixed/answer_agent/"
      mm_checkpoint: "checkpoints/config_b_mixed/memory_manager/"
      base_model: "unsloth/Qwen3.5-4B"
      use_mm: true
    - name: "config_c_full"
      checkpoint: "checkpoints/config_c_longmemeval_only/answer_agent/"
      mm_checkpoint: "checkpoints/config_c_longmemeval_only/memory_manager/"
      base_model: "unsloth/Qwen3.5-4B"
      use_mm: true

  metrics:
    - "f1"
    - "bleu1"
    - "exact_match"
    - "llm_judge"

  llm_judge:
    provider: "openai"         # OpenAI-compatible API (configure via env vars)
    model: "gpt-4o-mini"       # or any compatible model
    max_tokens: 256

  hardware:
    backend: "vllm"            # "hf" (HuggingFace transformers) or "vllm"
    gpus: 1                     # tensor_parallel_size for vLLM
    precision: "bf16"
    batch_size: 8               # HF backend only; vLLM handles batching internally
    gpu_memory_utilization: 0.85  # vLLM only; reduced to 0.45 automatically when AA+MM both loaded
    max_model_len: 4096         # vLLM max sequence length

  retrieval:
    top_k: 60

  output_dir: "results/"

wandb:
  project: "rl-memory-curriculum"
  entity: null
  enabled: true
